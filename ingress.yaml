apiVersion: networking.k8s.io/v1
kind: Ingress

metadata:
  name: task-api-ingress

spec:
  ingressClassName: nginx

  rules:
  - host: task.local

    http:
      paths:
      - path: /
        pathType: Prefix

        backend:
          service:
            name: task-api-service

            port:
              number: 8000