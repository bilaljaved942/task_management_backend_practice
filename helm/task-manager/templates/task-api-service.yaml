apiVersion: v1
kind: Service

metadata:
  name: task-api-service
  namespace: task-manager

spec:
  type: {{ .Values.service.type }}

  selector:
    app: task-api

  ports:
    - protocol: TCP
      port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.targetPort }}
      nodePort: {{ .Values.service.nodePort }}