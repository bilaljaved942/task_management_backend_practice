namespace: task-manager

image:
  repository: 056075870595.dkr.ecr.eu-north-1.amazonaws.com/task-manager-api
  tag: v1
  pullPolicy: Always

replicaCount: 2

service:
  type: NodePort
  port: 8000
  targetPort: 8000
  nodePort: 30080

resources:
  requests:
    cpu: "250m"
    memory: "256Mi"
  limits:
    cpu: "500m"
    memory: "512Mi"

config:
  DEBUG: "False"
  ALGORITHM: "HS256"
  ACCESS_TOKEN_EXPIRE_MINUTES: "30"

secret:
  SECRET_KEY: "ThisIsOurSecretKeyForDevelopment"
  DATABASE_URL: "postgresql://postgres:postgres@postgres-service:5432/task_manager"

postgres:
  image: postgres:16
  database: task_manager
  username: postgres
  password: postgres
  storage: 2Gi
  storageClass: gp2

hpa:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  cpuUtilization: 50

ingress:
  enabled: true
  className: nginx
  host: task.local
  path: /

namespaceCreation: true