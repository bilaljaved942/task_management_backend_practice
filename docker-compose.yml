version: "3.9"

services:

  postgres:
    image: postgres:16

    container_name: task-db

    restart: always

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: task_manager

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:

    build: .

    container_name: task-api

    restart: always

    depends_on:
      - postgres

    env_file:
      - .env

    ports:
      - "8000:8000"

volumes:

  postgres_data: