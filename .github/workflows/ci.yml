name: FastAPI CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:

  ##############################################################
  # 1. RUN TESTS
  ##############################################################

  test:

    runs-on: ubuntu-latest

    services:

      postgres:

        image: postgres:16

        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: task_manager

        ports:
          - 5432:5432

        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:

      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/task_manager

      SECRET_KEY: test_secret

      ALGORITHM: HS256

      ACCESS_TOKEN_EXPIRE_MINUTES: 30

      DEBUG: True

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5

        with:
          python-version: "3.13"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Tests
        run: |
          pytest

  ##############################################################
  # 2. BUILD & PUSH IMAGE
  ##############################################################

  docker:

    needs: test

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Login to DockerHub
        uses: docker/login-action@v3

        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker Image
        run: |

          docker build \
          -t dockerhub942/task-manager-api:latest \
          -t dockerhub942/task-manager-api:${{ github.sha }} .

      - name: Push Latest
        run: |
          docker push dockerhub942/task-manager-api:latest

      - name: Push Commit Tag
        run: |
          docker push dockerhub942/task-manager-api:${{ github.sha }}

  ##############################################################
  # 3. DEPLOY TO EC2
  ##############################################################

  deploy:

    needs: docker

    runs-on: ubuntu-latest

    steps:

      - name: Deploy to EC2

        uses: appleboy/ssh-action@v1.0.3

        with:

          host: ${{ secrets.EC2_HOST }}

          username: ${{ secrets.EC2_USERNAME }}

          key: ${{ secrets.EC2_SSH_KEY }}

          script: |

            docker pull dockerhub942/task-manager-api:latest

            docker stop task-api || true

            docker rm task-api || true

            docker run -d \
              --name task-api \
              --network task-network \
              -p 8000:8000 \
              -e DATABASE_URL=postgresql://postgres:postgres@postgres-db:5432/task_manager \
              -e SECRET_KEY=${{ secrets.SECRET_KEY }} \
              -e ALGORITHM=HS256 \
              -e ACCESS_TOKEN_EXPIRE_MINUTES=30 \
              -e DEBUG=False \
              dockerhub942/task-manager-api:latest